; PlatformIO - Ecowitt Display Kiosk (XE1E)
; Board: Waveshare ESP32-S3-Touch-LCD-7B (16MB Flash, 8MB PSRAM OPI)
;
; Enfoque "display tonto": el servidor renderiza el JPEG 1024x600 y el ESP32
; solo lo baja, lo decodifica (JPEGDEC) y lo pinta con doble framebuffer via
; el driver RGB nativo de esp_lcd (incluido en el core arduino-esp32). SIN LVGL.

[env:esp32s3]
; Fork pioarduino: arduino-esp32 3.x (IDF 5.x). Necesario para la API de doble
; framebuffer del panel RGB (esp_lcd_rgb_panel_get_frame_buffer, num_fbs=2);
; el platform oficial se quedo en arduino-esp32 2.0.17 (IDF 4.4) y no la tiene.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; Flash 16MB + PSRAM OPI 8MB (Waveshare)
board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi

build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_MODE_OCT=1

monitor_speed = 115200
upload_speed = 921600

; Recompila el IDF con el swap de framebuffer sincronizado a vsync. Sin esto,
; el panel RGB reinicia el barrido a medio frame al conmutar framebuffers y se
; ve un "brinco" vertical en cada actualizacion. Con esto: transicion limpia.
custom_sdkconfig =
    CONFIG_LCD_RGB_RESTART_IN_VSYNC=y

; Dependencias (sin LVGL, sin Arduino_GFX: el panel se maneja con esp_lcd nativo)
lib_deps =
    bitbank2/JPEGDEC@^1.6.1
    adafruit/Adafruit BME280 Library@^2.2.0
    adafruit/Adafruit Unified Sensor@^1.1.0
    adafruit/Adafruit BusIO@^1.14.0
